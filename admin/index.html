<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <title>Sugar & Victoria Admin</title>
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      min-height: 100dvh;
      overflow-x: hidden;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
    }
    
    /* Ensure CMS container is mobile-friendly */
    #nc-root {
      width: 100%;
      min-height: 100dvh;
      overflow: auto;
    }
    
    /* Fix for mobile sidebar and content */
    @media (max-width: 768px) {
      body {
        font-size: 14px;
      }

      #nc-root,
      #nc-root * {
        max-width: 100vw;
        box-sizing: border-box;
      }

      /* Decap CMS: force stacked panes on narrow screens */
      #nc-root [class*='AppMainContainer'],
      #nc-root [class*='ViewPaneContainer'] {
        flex-direction: column !important;
      }

      #nc-root [class*='SidebarContainer'],
      #nc-root [class*='CollectionContainer'],
      #nc-root [class*='EditorContainer'] {
        width: 100% !important;
        min-width: 0 !important;
      }

      /* Hide preview pane if rendered, so form stays fully visible */
      #nc-root [class*='EditorPreviewPaneContainer'],
      #nc-root [data-testid*='preview'] {
        display: none !important;
      }
      
      /* Ensure touch targets are large enough */
      button, a, input, select, textarea {
        min-height: 44px;
        font-size: 16px; /* Prevents zoom on iOS */
      }
      
      /* Fix for modals and overlays on mobile */
      .ReactModalPortal {
        position: fixed;
        inset: 0;
        z-index: 9999;
      }
    }
  </style>
</head>
<body>
  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
</body>
</html>
