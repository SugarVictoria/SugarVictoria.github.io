backend:
  name: git-gateway
  branch: main

local_backend: false

media_folder: "public/uploads"
public_folder: "/public/uploads"

site_url: "/"
display_url: "/"
logo_url: "/public/pfp.jpg"

# Mobile-friendly settings
slug:
  encoding: "ascii"
  clean_accents: true

# Show preview panel (can be toggled off on mobile if needed)
show_preview_links: false

collections:
  - name: "site_content"
    label: "Site Content"
    files:
      - file: "data/gallery.json"
        label: "Gallery"
        name: "gallery"
        fields:
          - label: "Images"
            name: "images"
            widget: list
            summary: "{{fields.alt}}"
            fields:
              - label: "Photo"
                name: "image"
                widget: image
                choose_url: false
                media_library:
                  config:
                    multiple: false
              - label: "Alt Text"
                name: "alt"
                widget: string
                required: false

      - file: "data/menu.json"
        label: "Menu"
        name: "menu"
        fields:
          - label: "Sections"
            name: "sections"
            widget: list
            summary: "{{fields.title}}"
            fields:
              - label: "Section ID"
                name: "id"
                widget: string
                hint: "Use short lowercase id (e.g. coffee, desserts)."
              - label: "Section Title"
                name: "title"
                widget: string
              - label: "Items"
                name: "items"
                widget: list
                summary: "{{fields.name}} - {{fields.price}}"
                fields:
                  - label: "Item Name"
                    name: "name"
                    widget: string
                  - label: "Description"
                    name: "description"
                    widget: text
                    required: false
                  - label: "Price"
                    name: "price"
                    widget: string
                    hint: "Example: GBP 4.20"

      - file: "data/news.json"
        label: "Latest News"
        name: "news"
        fields:
          - label: "Posts"
            name: "posts"
            widget: list
            summary: "{{fields.date}} - {{fields.title}}"
            fields:
              - label: "Title"
                name: "title"
                widget: string
              - label: "Date"
                name: "date"
                widget: datetime
                format: "YYYY-MM-DD"
                date_format: "YYYY-MM-DD"
                time_format: false
                picker_utc: false
              - label: "Type"
                name: "type"
                widget: string
                hint: "Examples: Update, Closure Notice, Holiday Hours"
              - label: "Summary"
                name: "summary"
                widget: text
              - label: "Link URL"
                name: "link_url"
                widget: string
                required: false
                hint: "Optional URL to link from this post."
              - label: "Link Label"
                name: "link_label"
                widget: string
                required: false
                hint: "Text for the link, e.g. 'Vote for us here'."

      - file: "data/homepage.json"
        label: "Homepage Sections"
        name: "homepage"
        fields:
          - label: "Main Carousel"
            name: "home_carousel"
            widget: object
            fields:
              - label: "Section Title"
                name: "title"
                widget: string
              - label: "Section Intro"
                name: "lead"
                widget: text
              - label: "Slides"
                name: "slides"
                widget: list
                summary: "{{fields.caption}}"
                hint: "Choose from uploaded photos in the media library."
                fields:
                  - label: "Photo"
                    name: "image"
                    widget: image
                    choose_url: false
                    media_library:
                      config:
                        multiple: false
                  - label: "Alt Text"
                    name: "alt"
                    widget: string
                    required: false
                  - label: "Caption"
                    name: "caption"
                    widget: string
                    required: false

          - label: "Celebration Cakes Carousel"
            name: "cakes_carousel"
            widget: object
            fields:
              - label: "Section Title"
                name: "title"
                widget: string
              - label: "Section Intro"
                name: "lead"
                widget: text
              - label: "Order Button Label"
                name: "order_button_label"
                widget: string
              - label: "Order Button Link"
                name: "order_button_url"
                widget: string
                hint: "Example: visit.html"
              - label: "Slides"
                name: "slides"
                widget: list
                summary: "{{fields.caption}}"
                hint: "Choose from uploaded photos in the media library."
                fields:
                  - label: "Photo"
                    name: "image"
                    widget: image
                    choose_url: false
                    media_library:
                      config:
                        multiple: false
                  - label: "Alt Text"
                    name: "alt"
                    widget: string
                    required: false
                  - label: "Caption"
                    name: "caption"
                    widget: string
                    required: false

      - file: "reviews.json"
        label: "Reviews"
        name: "reviews"
        fields:
          - label: "Reviews"
            name: "reviews"
            widget: list
            summary: "{{fields.source}} - {{fields.author}}"
            fields:
              - label: "Author"
                name: "author"
                widget: string
              - label: "Source"
                name: "source"
                widget: select
                options:
                  - "Google"
                  - "Facebook"
                  - "TripAdvisor"
                  - "Guest"
              - label: "Date"
                name: "date"
                widget: string
                hint: "Example: 6 Mar 2026"
              - label: "Rating"
                name: "rating"
                widget: number
                value_type: int
                min: 1
                max: 5
              - label: "Title"
                name: "title"
                widget: string
              - label: "Review Text"
                name: "text"
                widget: text
              - label: "Visit Type"
                name: "visit_type"
                widget: string
                required: false

      - file: "data/visit.json"
        label: "Visit and Contact"
        name: "visit"
        fields:
          - label: "Address Lines"
            name: "address_lines"
            widget: list
            field:
              label: "Line"
              name: "line"
              widget: string
          - label: "Phone"
            name: "phone"
            widget: string
          - label: "Email"
            name: "email"
            widget: string
          - label: "Instagram URL"
            name: "instagram_url"
            widget: string
          - label: "Instagram Handle"
            name: "instagram_handle"
            widget: string
          - label: "Overview Text"
            name: "overview"
            widget: text
          - label: "Opening Hours"
            name: "opening_hours"
            widget: list
            summary: "{{fields.day}}: {{fields.hours}}"
            fields:
              - label: "Day"
                name: "day"
                widget: string
              - label: "Hours"
                name: "hours"
                widget: string
          - label: "Google Map Embed URL"
            name: "map_embed_url"
            widget: string
